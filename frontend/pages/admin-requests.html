<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Requests — Quad Solutions Admin</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(11,31,58,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: 14px;
      padding: 2rem;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 8px 40px rgba(11,31,58,0.18);
    }
    .modal h3 { font-family: var(--font-head); font-size: 1.4rem; margin-bottom: 1.5rem; }
    .detail-row { display: flex; justify-content: space-between; padding: 0.55rem 0; border-bottom: 1px solid var(--gray-lt); font-size: 0.9rem; }
    .detail-row .lbl { color: var(--gray); }
    .detail-row .val { font-weight: 500; text-align: right; max-width: 60%; }
    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .filter-bar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
    .filter-bar select, .filter-bar input {
      padding: 0.5rem 0.9rem;
      border: 1.5px solid var(--gray-lt);
      border-radius: var(--radius);
      font-family: var(--font-body);
      font-size: 0.88rem;
      background: var(--white);
      color: var(--navy);
    }
    .btn-danger { background: var(--danger); color: #fff; border: none; padding: 0.55rem 1.1rem; border-radius: var(--radius); cursor: pointer; font-family: var(--font-body); font-size: 0.88rem; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8rem; }
  </style>
</head>
<body>
<div class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-brand">Quad<span>Admin</span></div>
    <nav>
      <a href="admin-dashboard.html">📊 Dashboard</a>
      <a href="admin-requests.html" class="active">📋 All Requests</a>
      <a href="admin-clients.html">👥 Clients</a>
    </nav>
    <div class="sidebar-logout">
      <button class="btn-outline" onclick="logout()" style="width:100%;font-size:0.85rem">Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <h1 class="page-title">All Requests</h1>

    <div class="filter-bar">
      <select id="filter-status" onchange="applyFilter()">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="in_review">In Review</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
      <input type="text" id="filter-search" placeholder="Search provider or client..." oninput="applyFilter()" style="min-width:220px"/>
      <span id="count-label" style="color:var(--gray);font-size:0.85rem;margin-left:auto"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Provider</th>
            <th>Specialty</th>
            <th>Insurance</th>
            <th>Status</th>
            <th>Date</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="requests-tbody">
          <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray)">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- Update Status Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3>Update Request</h3>

    <div id="modal-details"></div>

    <div class="form-group" style="margin-top:1.25rem">
      <label>Status</label>
      <select id="modal-status">
        <option value="pending">Pending</option>
        <option value="in_review">In Review</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div class="form-group">
      <label>Admin Notes (optional)</label>
      <textarea id="modal-notes" placeholder="Add notes for this application..."></textarea>
    </div>

    <div id="modal-alert" class="alert"></div>

    <div class="modal-actions">
      <button class="btn-primary" onclick="saveStatus()" style="flex:1">Save Changes</button>
      <button class="btn-danger" onclick="deleteRequest()">Delete</button>
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
  requireAdmin();

  let allRequests = [];
  let currentId   = null;

  async function loadRequests() {
    try {
      allRequests = await adminAPI.allRequests();
      renderTable(allRequests);

      // If URL has ?id= open that request immediately
      const params = new URLSearchParams(window.location.search);
      if (params.get('id')) openModal(params.get('id'));
    } catch (err) {
      document.getElementById('requests-tbody').innerHTML =
        `<tr><td colspan="7" style="color:var(--danger);padding:1rem">${err.message}</td></tr>`;
    }
  }

  function renderTable(data) {
    const tbody = document.getElementById('requests-tbody');
    document.getElementById('count-label').textContent = `${data.length} request${data.length !== 1 ? 's' : ''}`;

    if (data.length === 0) {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--gray)">No requests found</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(r => `
      <tr>
        <td>
          <strong>${r.client?.name || '—'}</strong>
          <br/><span style="color:var(--gray);font-size:0.78rem">${r.client?.email || ''}</span>
        </td>
        <td>
          ${r.providerName}
          <br/><span style="color:var(--gray);font-size:0.78rem">NPI: ${r.providerNPI}</span>
        </td>
        <td>${r.specialty}</td>
        <td>${r.insurancePlan}</td>
        <td>${statusBadge(r.status)}</td>
        <td>${formatDate(r.createdAt)}</td>
        <td>
          <button class="btn-primary btn-sm" onclick="openModal('${r._id}')">Update</button>
        </td>
      </tr>
    `).join('');
  }

  function applyFilter() {
    const status = document.getElementById('filter-status').value;
    const search = document.getElementById('filter-search').value.toLowerCase();

    const filtered = allRequests.filter(r => {
      const matchStatus = !status || r.status === status;
      const matchSearch = !search ||
        r.providerName.toLowerCase().includes(search) ||
        (r.client?.name || '').toLowerCase().includes(search) ||
        (r.client?.email || '').toLowerCase().includes(search);
      return matchStatus && matchSearch;
    });

    renderTable(filtered);
  }

  function openModal(id) {
    currentId = id;
    const r = allRequests.find(x => x._id === id);
    if (!r) return;

    document.getElementById('modal-status').value = r.status;
    document.getElementById('modal-notes').value  = r.adminNotes || '';
    hideAlert('modal-alert');

    document.getElementById('modal-details').innerHTML = `
      <div class="detail-row"><span class="lbl">Client</span><span class="val">${r.client?.name} (${r.client?.email})</span></div>
      <div class="detail-row"><span class="lbl">Provider</span><span class="val">${r.providerName}</span></div>
      <div class="detail-row"><span class="lbl">NPI</span><span class="val">${r.providerNPI}</span></div>
      <div class="detail-row"><span class="lbl">Specialty</span><span class="val">${r.specialty}</span></div>
      <div class="detail-row"><span class="lbl">Insurance</span><span class="val">${r.insurancePlan}</span></div>
      <div class="detail-row"><span class="lbl">License</span><span class="val">${r.licenseNumber} (${r.licenseState})</span></div>
      ${r.notes ? `<div class="detail-row"><span class="lbl">Client notes</span><span class="val">${r.notes}</span></div>` : ''}
    `;

    document.getElementById('modal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    currentId = null;
    // Clean up URL param
    window.history.replaceState({}, '', 'admin-requests.html');
  }

  async function saveStatus() {
    hideAlert('modal-alert');
    const status     = document.getElementById('modal-status').value;
    const adminNotes = document.getElementById('modal-notes').value.trim();

    try {
      const updated = await adminAPI.updateStatus(currentId, { status, adminNotes });
      // Update local data
      const idx = allRequests.findIndex(r => r._id === currentId);
      if (idx !== -1) allRequests[idx] = { ...allRequests[idx], status, adminNotes };
      applyFilter();
      showAlert('modal-alert', '✅ Status updated successfully', 'success');
      setTimeout(closeModal, 1200);
    } catch (err) {
      showAlert('modal-alert', err.message, 'error');
    }
  }

  async function deleteRequest() {
    if (!confirm('Are you sure you want to delete this request? This cannot be undone.')) return;
    try {
      await adminAPI.deleteRequest(currentId);
      allRequests = allRequests.filter(r => r._id !== currentId);
      applyFilter();
      closeModal();
    } catch (err) {
      showAlert('modal-alert', err.message, 'error');
    }
  }

  // Close modal on overlay click
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  loadRequests();
</script>
</body>
</html>
