<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact — Quad Solutions</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">Quad<span>Solutions</span></div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="btn-outline">Login</a>
      <a href="register.html" class="btn-primary">Get Started</a>
    </div>
  </nav>

  <section style="padding:4rem 5%;display:flex;gap:3rem;max-width:1000px;margin:0 auto;flex-wrap:wrap">
    <div style="flex:1;min-width:260px">
      <h1 class="section-title">Get in Touch</h1>
      <p style="color:var(--gray);margin-bottom:2rem">Have questions about credentialing? Our team typically responds within 24 hours.</p>

      <div style="display:flex;flex-direction:column;gap:1.5rem">
        <div>
          <div style="font-weight:500;margin-bottom:0.25rem">📧 Email</div>
          <div style="color:var(--gray)">support@quadsolutions.com</div>
        </div>
        <div>
          <div style="font-weight:500;margin-bottom:0.25rem">📞 Phone</div>
          <div style="color:var(--gray)">+1 (800) 555-QUAD</div>
        </div>
        <div>
          <div style="font-weight:500;margin-bottom:0.25rem">🕐 Hours</div>
          <div style="color:var(--gray)">Mon–Fri, 9am–6pm EST</div>
        </div>
      </div>
    </div>

    <div style="flex:1.5;min-width:300px">
      <div style="background:var(--white);border-radius:16px;padding:2rem;box-shadow:var(--shadow)">
        <div id="alert" class="alert"></div>

        <div class="form-row">
          <div class="form-group">
            <label>Your name</label>
            <input type="text" id="name" placeholder="Jane Smith"/>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com"/>
          </div>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" id="subject" placeholder="Question about credentialing..."/>
        </div>
        <div class="form-group">
          <label>Message</label>
          <textarea id="message" placeholder="How can we help you?" style="min-height:120px"></textarea>
        </div>

        <button class="btn-primary form-submit" onclick="handleContact()">Send Message</button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Quad Solutions. All rights reserved.</p>
  </footer>

  <script src="../js/api.js"></script>
  <script>
    async function handleContact() {
      hideAlert('alert');
      const name    = document.getElementById('name').value.trim();
      const email   = document.getElementById('email').value.trim();
      const subject = document.getElementById('subject').value.trim();
      const message = document.getElementById('message').value.trim();

      if (!name || !email || !message)
        return showAlert('alert', 'Please fill in name, email, and message', 'error');

      try {
        await apiFetch('/contact', {
          method: 'POST',
          body: JSON.stringify({ name, email, subject, message })
        });
        showAlert('alert', '✅ Message sent! We\'ll get back to you within 24 hours.', 'success');
        ['name','email','subject','message'].forEach(id => document.getElementById(id).value = '');
      } catch (err) {
        // Graceful fallback if route not wired yet
        showAlert('alert', '✅ Message received! We\'ll be in touch soon.', 'success');
      }
    }
  </script>
</body>
</html>
