<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Quad Solutions</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <h2>Welcome back</h2>
      <p class="subtitle">Sign in to your Quad Solutions account</p>

      <div id="alert" class="alert"></div>

      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn-primary form-submit" onclick="handleLogin()">Sign In</button>

      <p class="form-footer">
        Don't have an account? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // If already logged in, redirect
    if (isLoggedIn()) {
      window.location.href = isAdmin() ? 'admin-dashboard.html' : 'client-dashboard.html';
    }

    async function handleLogin() {
      hideAlert('alert');
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password)
        return showAlert('alert', 'Please fill in all fields');

      try {
        const data = await authAPI.login({ email, password });
        saveAuth(data);
        window.location.href = data.role === 'admin' ? 'admin-dashboard.html' : 'client-dashboard.html';
      } catch (err) {
        showAlert('alert', err.message);
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
