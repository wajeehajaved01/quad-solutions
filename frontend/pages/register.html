<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — Quad Solutions</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <h2>Create account</h2>
      <p class="subtitle">Start your credentialing journey today</p>

      <div id="alert" class="alert"></div>

      <div class="form-row">
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="name" placeholder="Dr. Jane Smith"/>
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" id="phone" placeholder="+1 234 567 8900"/>
        </div>
      </div>
      <div class="form-group">
        <label>Company / Organization</label>
        <input type="text" id="company" placeholder="ABC Medical Group"/>
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimum 6 characters"/>
      </div>

      <button class="btn-primary form-submit" onclick="handleRegister()">Create Account</button>

      <p class="form-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script>
    async function handleRegister() {
      hideAlert('alert');
      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const company  = document.getElementById('company').value.trim();
      const phone    = document.getElementById('phone').value.trim();

      if (!name || !email || !password)
        return showAlert('alert', 'Name, email and password are required');
      if (password.length < 6)
        return showAlert('alert', 'Password must be at least 6 characters');

      try {
        const data = await authAPI.register({ name, email, password, company, phone });
        saveAuth(data);
        window.location.href = 'client-dashboard.html';
      } catch (err) {
        showAlert('alert', err.message);
      }
    }
  </script>
</body>
</html>
